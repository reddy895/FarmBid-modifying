version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: farmbid-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - farmbid-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmbid-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017
      DB_NAME: farmbid_db
      PORT: 3001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
    depends_on:
      - mongodb
    networks:
      - farmbid-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farmbid-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - farmbid-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

networks:
  farmbid-network:
    driver: bridge

volumes:
  mongodb_data:
